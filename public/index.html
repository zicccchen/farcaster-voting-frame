<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Base Voting Frame</title>
    <meta name="base:app_id" content="699fb26232f0feeaa21ef950" />
    <meta name="talentapp:project_verification" content="8f3bdc7f1369efd139e1ff156a8560e3c342e84bc88abda80fdb58ab6f7d95d0c3a4cf3f3d03ac20616f5f7cfa35e19a7434d08bf62935d2bcf96618e74399fc" />
    <meta name="fc:miniapp" content='{"version":"1","imageUrl":"https://farcaster-voting-frame.vercel.app/hero.png","button":{"title":"🗳️ Vote Now","action":{"type":"launch_frame","name":"Base Voting Frame","url":"https://farcaster-voting-frame.vercel.app","splashImageUrl":"https://farcaster-voting-frame.vercel.app/splash.png","splashBackgroundColor":"#0052FF"}}}' />
    <meta name="fc:frame" content='{"version":"1","imageUrl":"https://farcaster-voting-frame.vercel.app/hero.png","button":{"title":"🗳️ Vote Now","action":{"type":"launch_frame","name":"Base Voting Frame","url":"https://farcaster-voting-frame.vercel.app","splashImageUrl":"https://farcaster-voting-frame.vercel.app/splash.png","splashBackgroundColor":"#0052FF"}}}' />
    <meta property="og:title" content="Base Voting Frame" />
    <meta property="og:description" content="Onchain voting on Base" />
    <meta property="og:image" content="https://farcaster-voting-frame.vercel.app/hero.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #0052FF;
            --blue-dark: #0040CC;
            --blue-light: #3375FF;
            --bg: #0a0b0f;
            --card: #12141a;
            --card-hover: #181b23;
            --border: #1e2230;
            --text: #f0f2f5;
            --text-dim: #7a8199;
            --green: #22c55e;
            --red: #ef4444;
            --orange: #f59e0b;
            --purple: #8b5cf6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(0,82,255,0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(139,92,246,0.05) 0%, transparent 50%);
            animation: bgShift 20s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes bgShift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-5%, 3%); }
        }

        /* Header */
        .header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10,11,15,0.85);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 32px;
            height: 32px;
            background: var(--blue);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .header-title {
            font-family: 'Space Mono', monospace;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .wallet-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-family: 'Space Mono', monospace;
            cursor: pointer;
            transition: all 0.2s;
        }

        .wallet-btn:hover { background: var(--card-hover); }

        .wallet-btn.connected {
            border-color: var(--green);
            color: var(--green);
        }

        /* Navigation */
        .nav {
            display: flex;
            padding: 12px 20px;
            gap: 8px;
        }

        .nav-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .nav-btn.active {
            background: var(--blue);
            border-color: var(--blue);
            color: white;
        }

        .nav-btn:not(.active):hover {
            border-color: var(--blue-light);
            color: var(--text);
        }

        /* Main content */
        .content {
            padding: 16px 20px;
            padding-bottom: 100px;
        }

        /* Proposal card */
        .proposal-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 14px;
            transition: all 0.3s;
            cursor: pointer;
            animation: fadeUp 0.4s ease both;
        }

        .proposal-card:hover {
            border-color: var(--blue);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0,82,255,0.1);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .proposal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .proposal-title {
            font-size: 17px;
            font-weight: 700;
            line-height: 1.3;
            flex: 1;
        }

        .proposal-status {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            margin-left: 12px;
        }

        .status-active {
            background: rgba(34,197,94,0.15);
            color: var(--green);
        }

        .status-ended {
            background: rgba(239,68,68,0.15);
            color: var(--red);
        }

        .proposal-desc {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .proposal-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: var(--text-dim);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Vote options */
        .vote-option {
            position: relative;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 10px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.2s;
        }

        .vote-option:hover {
            border-color: var(--blue-light);
        }

        .vote-option.selected {
            border-color: var(--blue);
            background: rgba(0,82,255,0.05);
        }

        .vote-option.voted {
            cursor: default;
        }

        .vote-bar {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            border-radius: 12px;
            transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 0;
        }

        .vote-option-content {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .vote-option-label {
            font-weight: 600;
            font-size: 15px;
        }

        .vote-option-stats {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Space Mono', monospace;
            font-size: 14px;
        }

        .vote-pct {
            font-weight: 700;
            min-width: 45px;
            text-align: right;
        }

        .vote-count {
            color: var(--text-dim);
            font-size: 12px;
        }

        /* Countdown */
        .countdown {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 16px 0;
        }

        .countdown-unit {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            text-align: center;
            min-width: 60px;
        }

        .countdown-value {
            font-family: 'Space Mono', monospace;
            font-size: 22px;
            font-weight: 700;
            color: var(--blue-light);
        }

        .countdown-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* Total votes badge */
        .total-votes {
            text-align: center;
            padding: 12px;
            background: rgba(0,82,255,0.08);
            border-radius: 12px;
            margin: 16px 0;
            font-family: 'Space Mono', monospace;
        }

        .total-votes-number {
            font-size: 28px;
            font-weight: 700;
            color: var(--blue-light);
        }

        .total-votes-label {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        /* Vote button */
        .vote-submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .vote-submit-btn:hover { background: var(--blue-dark); }
        .vote-submit-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .vote-submit-btn.success {
            background: var(--green);
        }

        /* Create form */
        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus, .form-textarea:focus {
            border-color: var(--blue);
        }

        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .option-row input { flex: 1; }

        .remove-option-btn {
            width: 36px;
            height: 36px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: var(--red);
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .add-option-btn {
            background: transparent;
            border: 1px dashed var(--border);
            color: var(--blue-light);
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-top: 8px;
            width: 100%;
            font-family: 'DM Sans', sans-serif;
        }

        .add-option-btn:hover { border-color: var(--blue); }

        /* Back button */
        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            color: var(--blue-light);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 0;
            margin-bottom: 16px;
            font-family: 'DM Sans', sans-serif;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--card);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            z-index: 1000;
            transition: transform 0.3s ease;
            white-space: nowrap;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { border-color: var(--red); color: var(--red); }
        .toast.success { border-color: var(--green); color: var(--green); }

        /* Color bars for options */
        .bar-0 { background: rgba(0,82,255,0.15); }
        .bar-1 { background: rgba(139,92,246,0.15); }
        .bar-2 { background: rgba(34,197,94,0.15); }
        .bar-3 { background: rgba(245,158,11,0.15); }
        .bar-4 { background: rgba(239,68,68,0.15); }
        .bar-5 { background: rgba(236,72,153,0.15); }

        .text-0 { color: var(--blue-light); }
        .text-1 { color: var(--purple); }
        .text-2 { color: var(--green); }
        .text-3 { color: var(--orange); }
        .text-4 { color: var(--red); }
        .text-5 { color: #ec4899; }

        /* Responsive */
        @media (max-width: 400px) {
            .content { padding: 12px 14px; padding-bottom: 100px; }
            .proposal-card { padding: 16px; }
        }

        /* Hide scrollbar */
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <div class="logo">🗳️</div>
        <div class="header-title">BaseVote</div>
    </div>
    <button class="wallet-btn" id="walletBtn" onclick="connectWallet()">
        Connect
    </button>
</div>

<div class="nav">
    <button class="nav-btn active" id="navVote" onclick="showTab('vote')">🗳️ Vote</button>
    <button class="nav-btn" id="navCreate" onclick="showTab('create')">✏️ Create</button>
</div>

<div class="content" id="content">
    <div class="loading">
        <div class="spinner"></div>
        <div>Loading proposals...</div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
    import { sdk } from 'https://esm.sh/@farcaster/miniapp-sdk';
    window.farcasterSdk = sdk;

    // Signal ready to Farcaster
    try { await sdk.actions.ready(); } catch(e) {}

    // 在 Mini App 环境自动连接钱包
    try {
        const ethProvider = await sdk.wallet.getEthereumProvider();
        if (ethProvider) {
            window.farcasterEthProvider = ethProvider;
            // 触发自动连接（等待主脚本加载完成）
            setTimeout(() => {
                if (window.connectWallet) window.connectWallet();
            }, 100);
        }
    } catch(e) {
        console.log('Farcaster wallet not available');
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>

<script>
    // ===== STATE =====
    let currentTab = 'vote';
    let proposals = [];
    let selectedProposal = null;
    let selectedOption = null;
    let userAddress = null;
    let signer = null;
    let provider = null;
    let contract = null;
    let contractAddress = '';
    let countdownIntervals = {};

    const VOTING_ABI = [
        "function createProposal(string memory _title, string memory _description, string[] memory _options, uint256 _durationInHours) public returns (uint256)",
        "function vote(uint256 _proposalId, uint256 _optionIndex) public",
        "function getProposal(uint256 _proposalId) public view returns (uint256 id, string memory title, string memory description, string[] memory options, uint256[] memory voteCounts, uint256 endTime, address creator, bool active, uint256 totalVotes)",
        "function hasVoted(uint256, address) public view returns (bool)",
        "function proposalCount() public view returns (uint256)"
    ];

    const COLORS = ['#3375FF', '#8b5cf6', '#22c55e', '#f59e0b', '#ef4444', '#ec4899'];

    // ===== INIT =====
    async function init() {
        try {
            const res = await fetch('/api/contract');
            const data = await res.json();
            contractAddress = data.address;
        } catch(e) {}

        await loadProposals();
        autoConnect();
    }

    async function autoConnect() {
        if (typeof window.ethereum !== 'undefined') {
            try {
                const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                if (accounts.length > 0) {
                    await connectWallet();
                }
            } catch(e) {}
        }
    }

    // ===== WALLET =====
    async function connectWallet() {
        try {
            let ethProvider;

            // 优先使用 Farcaster SDK 的钱包
            if (window.farcasterEthProvider) {
                ethProvider = window.farcasterEthProvider;
                console.log('Using Farcaster SDK wallet');
            } else if (window.farcasterSdk) {
                try {
                    ethProvider = await window.farcasterSdk.wallet.getEthereumProvider();
                    console.log('Got Farcaster SDK wallet');
                } catch(e) {
                    console.log('Farcaster wallet not available, trying window.ethereum');
                }
            }

            // 回退到 window.ethereum (浏览器使用)
            if (!ethProvider && typeof window.ethereum !== 'undefined') {
                ethProvider = window.ethereum;
            }

            if (!ethProvider) {
                showToast('No wallet found', 'error');
                return;
            }

            // 请求连接
            await ethProvider.request({ method: 'eth_requestAccounts' });

            // 切换到 Base
            try {
                await ethProvider.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0x2105' }]
                });
            } catch(e) {
                // 忽略切换错误，继续执行
            }

            provider = new ethers.BrowserProvider(ethProvider);
            signer = await provider.getSigner();
            userAddress = await signer.getAddress();

            if (contractAddress) {
                contract = new ethers.Contract(contractAddress, VOTING_ABI, signer);
            }

            const btn = document.getElementById('walletBtn');
            btn.textContent = userAddress.slice(0,6) + '...' + userAddress.slice(-4);
            btn.classList.add('connected');

            showToast('Wallet connected!', 'success');

            if (selectedProposal) {
                showProposalDetail(selectedProposal.id);
            }
        } catch(e) {
            showToast('Connection failed', 'error');
            console.error(e);
        }
    }

    // ===== DATA =====
    async function loadProposals() {
        try {
            const res = await fetch('/api/proposals');
            proposals = await res.json();
        } catch(e) {
            proposals = [];
        }
        if (currentTab === 'vote' && !selectedProposal) {
            renderProposalList();
        }
    }

    // ===== RENDER: Proposal List =====
    function renderProposalList() {
        const content = document.getElementById('content');

        if (proposals.length === 0) {
            content.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">🗳️</div>
                    <div class="empty-title">No proposals yet</div>
                    <div>Be the first to create a vote!</div>
                </div>
            `;
            return;
        }

        const now = Math.floor(Date.now() / 1000);
        // Sort: active first, then by id desc
        const sorted = [...proposals].sort((a, b) => {
            const aActive = a.endTime > now;
            const bActive = b.endTime > now;
            if (aActive !== bActive) return bActive - aActive;
            return b.id - a.id;
        });

        content.innerHTML = sorted.map((p, i) => {
            const isActive = p.endTime > now;
            const timeLeft = getTimeLeftStr(p.endTime);
            return `
                <div class="proposal-card" style="animation-delay: ${i * 0.08}s" onclick="showProposalDetail(${p.id})">
                    <div class="proposal-header">
                        <div class="proposal-title">${escHtml(p.title)}</div>
                        <span class="proposal-status ${isActive ? 'status-active' : 'status-ended'}">
                            ${isActive ? '● Live' : '● Ended'}
                        </span>
                    </div>
                    <div class="proposal-desc">${escHtml(p.description).substring(0, 100)}${p.description.length > 100 ? '...' : ''}</div>
                    <div class="proposal-meta">
                        <div class="meta-item">🗳️ ${p.totalVotes} vote${p.totalVotes !== 1 ? 's' : ''}</div>
                        <div class="meta-item">📊 ${p.options.length} options</div>
                        <div class="meta-item">⏱️ ${isActive ? timeLeft : 'Ended'}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ===== RENDER: Proposal Detail =====
    async function showProposalDetail(id) {
        // Fetch fresh data
        try {
            const res = await fetch(`/api/proposals/${id}`);
            selectedProposal = await res.json();
        } catch(e) {
            showToast('Failed to load', 'error');
            return;
        }

        const p = selectedProposal;
        const now = Math.floor(Date.now() / 1000);
        const isActive = p.endTime > now;
        selectedOption = null;

        let hasVoted = false;
        let userVoteIndex = -1;
        if (userAddress) {
            try {
                const res = await fetch(`/api/hasVoted/${p.id}/${userAddress}`);
                const data = await res.json();
                hasVoted = data.hasVoted;
            } catch(e) {}
        }

        const showResults = hasVoted || !isActive;

        const content = document.getElementById('content');
        content.innerHTML = `
            <button class="back-btn" onclick="goBack()">← Back to proposals</button>

            <div class="proposal-card" style="cursor:default;">
                <div class="proposal-header">
                    <div class="proposal-title" style="font-size:20px;">${escHtml(p.title)}</div>
                    <span class="proposal-status ${isActive ? 'status-active' : 'status-ended'}">
                        ${isActive ? '● Live' : '● Ended'}
                    </span>
                </div>
                <div class="proposal-desc">${escHtml(p.description)}</div>
            </div>

            ${isActive ? `<div class="countdown" id="countdown-${p.id}"></div>` : ''}

            <div class="total-votes">
                <div class="total-votes-number" id="totalVotesNum">${p.totalVotes}</div>
                <div class="total-votes-label">Total Votes</div>
            </div>

            <div id="optionsContainer">
                ${p.options.map((opt, i) => {
                    const pct = p.totalVotes > 0 ? ((p.voteCounts[i] / p.totalVotes) * 100).toFixed(1) : 0;
                    const colorIdx = i % COLORS.length;
                    return `
                        <div class="vote-option ${showResults ? 'voted' : ''} ${hasVoted && userVoteIndex === i ? 'selected' : ''}"
                             id="option-${i}"
                             onclick="${!showResults && isActive ? `selectOption(${i})` : ''}">
                            ${showResults ? `<div class="vote-bar bar-${colorIdx}" style="width: ${pct}%"></div>` : ''}
                            <div class="vote-option-content">
                                <span class="vote-option-label">${escHtml(opt)}</span>
                                <div class="vote-option-stats">
                                    ${showResults ? `
                                        <span class="vote-count">${p.voteCounts[i]}</span>
                                        <span class="vote-pct text-${colorIdx}">${pct}%</span>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>

            ${!hasVoted && isActive ? `
                <button class="vote-submit-btn" id="voteBtn" onclick="submitVote()" disabled>
                    Select an option to vote
                </button>
            ` : ''}

            ${hasVoted ? `
                <div style="text-align:center; color:var(--green); font-weight:600; margin-top:16px;">
                    ✅ You have voted
                </div>
            ` : ''}

            <div style="text-align:center; margin-top:12px; font-size:12px; color:var(--text-dim);">
                Created by ${p.creator.slice(0,6)}...${p.creator.slice(-4)}
            </div>
        `;

        if (isActive) {
            updateCountdown(p.id, p.endTime);
            clearInterval(countdownIntervals[p.id]);
            countdownIntervals[p.id] = setInterval(() => updateCountdown(p.id, p.endTime), 1000);
        }
    }

    function selectOption(index) {
        selectedOption = index;
        document.querySelectorAll('.vote-option').forEach((el, i) => {
            el.classList.toggle('selected', i === index);
        });
        const btn = document.getElementById('voteBtn');
        if (btn) {
            btn.disabled = false;
            btn.textContent = '🗳️ Cast Your Vote';
        }
    }

    async function submitVote() {
        if (selectedOption === null) return;
        if (!userAddress) {
            await connectWallet();
            if (!userAddress) return;
        }

        const btn = document.getElementById('voteBtn');
        btn.disabled = true;
        btn.textContent = 'Submitting...';

        try {
            if (!contract) {
                contract = new ethers.Contract(contractAddress, VOTING_ABI, signer);
            }

            const tx = await contract.vote(selectedProposal.id, selectedOption);
            btn.textContent = 'Confirming on Base...';
            await tx.wait();

            btn.textContent = '✅ Vote Cast!';
            btn.classList.add('success');
            showToast('Vote submitted onchain!', 'success');

            // Refresh
            setTimeout(() => {
                loadProposals();
                showProposalDetail(selectedProposal.id);
            }, 2000);

        } catch(e) {
            console.error(e);
            if (e.message?.includes('Already voted')) {
                showToast('You already voted', 'error');
            } else if (e.code === 'ACTION_REJECTED') {
                showToast('Transaction cancelled', 'error');
            } else {
                showToast('Vote failed: ' + (e.reason || e.message?.substring(0,40) || 'Unknown error'), 'error');
            }
            btn.disabled = false;
            btn.textContent = '🗳️ Cast Your Vote';
        }
    }

    // ===== RENDER: Create Form =====
    function renderCreateForm() {
        const content = document.getElementById('content');
        content.innerHTML = `
            <div style="margin-bottom:20px;">
                <div style="font-size:20px; font-weight:700; margin-bottom:4px;">Create Proposal</div>
                <div style="color:var(--text-dim); font-size:14px;">Start a new onchain vote</div>
            </div>

            <div class="form-group">
                <label class="form-label">Title</label>
                <input class="form-input" id="propTitle" placeholder="e.g. Should we expand to Solana?" maxlength="100">
            </div>

            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea class="form-textarea" id="propDesc" placeholder="Describe what this vote is about..." maxlength="500"></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Options</label>
                <div class="options-list" id="optionsList">
                    <div class="option-row">
                        <input class="form-input option-input" placeholder="Option 1" maxlength="50">
                    </div>
                    <div class="option-row">
                        <input class="form-input option-input" placeholder="Option 2" maxlength="50">
                    </div>
                </div>
                <button class="add-option-btn" onclick="addOption()">+ Add Option</button>
            </div>

            <div class="form-group">
                <label class="form-label">Duration</label>
                <select class="form-input form-select" id="propDuration">
                    <option value="1">1 hour</option>
                    <option value="6">6 hours</option>
                    <option value="24" selected>24 hours</option>
                    <option value="48">2 days</option>
                    <option value="72">3 days</option>
                    <option value="168">7 days</option>
                </select>
            </div>

            <button class="vote-submit-btn" onclick="createProposal()">
                Create Proposal
            </button>
        `;
    }

    function addOption() {
        const list = document.getElementById('optionsList');
        const count = list.children.length;
        if (count >= 6) {
            showToast('Maximum 6 options', 'error');
            return;
        }
        const row = document.createElement('div');
        row.className = 'option-row';
        row.innerHTML = `
            <input class="form-input option-input" placeholder="Option ${count + 1}" maxlength="50">
            <button class="remove-option-btn" onclick="this.parentElement.remove()">×</button>
        `;
        list.appendChild(row);
    }

    async function createProposal() {
        if (!userAddress) {
            await connectWallet();
            if (!userAddress) return;
        }

        const title = document.getElementById('propTitle').value.trim();
        const desc = document.getElementById('propDesc').value.trim();
        const duration = parseInt(document.getElementById('propDuration').value);
        const optionInputs = document.querySelectorAll('.option-input');
        const options = Array.from(optionInputs).map(i => i.value.trim()).filter(v => v);

        if (!title) { showToast('Title is required', 'error'); return; }
        if (options.length < 2) { showToast('At least 2 options required', 'error'); return; }

        const btn = document.querySelector('.vote-submit-btn');
        btn.disabled = true;
        btn.textContent = 'Creating...';

        try {
            if (!contract) {
                contract = new ethers.Contract(contractAddress, VOTING_ABI, signer);
            }

            const tx = await contract.createProposal(title, desc || 'No description', options, duration);
            btn.textContent = 'Confirming on Base...';
            await tx.wait();

            btn.textContent = '✅ Proposal Created!';
            btn.classList.add('success');
            showToast('Proposal created onchain!', 'success');

            setTimeout(() => {
                loadProposals();
                showTab('vote');
            }, 2000);

        } catch(e) {
            console.error(e);
            if (e.code === 'ACTION_REJECTED') {
                showToast('Transaction cancelled', 'error');
            } else {
                showToast('Failed: ' + (e.reason || e.message?.substring(0,40) || 'Unknown error'), 'error');
            }
            btn.disabled = false;
            btn.textContent = 'Create Proposal';
        }
    }

    // ===== HELPERS =====
    function showTab(tab) {
        currentTab = tab;
        selectedProposal = null;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab === 'vote' ? 'navVote' : 'navCreate').classList.add('active');

        if (tab === 'vote') {
            renderProposalList();
        } else {
            renderCreateForm();
        }
    }

    function goBack() {
        selectedProposal = null;
        Object.values(countdownIntervals).forEach(clearInterval);
        renderProposalList();
    }

    function updateCountdown(id, endTime) {
        const el = document.getElementById(`countdown-${id}`);
        if (!el) return;

        const now = Math.floor(Date.now() / 1000);
        const diff = endTime - now;

        if (diff <= 0) {
            el.innerHTML = '<div style="color:var(--red); font-weight:600;">Voting has ended</div>';
            clearInterval(countdownIntervals[id]);
            return;
        }

        const d = Math.floor(diff / 86400);
        const h = Math.floor((diff % 86400) / 3600);
        const m = Math.floor((diff % 3600) / 60);
        const s = diff % 60;

        el.innerHTML = `
            ${d > 0 ? `<div class="countdown-unit"><div class="countdown-value">${d}</div><div class="countdown-label">Days</div></div>` : ''}
            <div class="countdown-unit"><div class="countdown-value">${String(h).padStart(2,'0')}</div><div class="countdown-label">Hours</div></div>
            <div class="countdown-unit"><div class="countdown-value">${String(m).padStart(2,'0')}</div><div class="countdown-label">Min</div></div>
            <div class="countdown-unit"><div class="countdown-value">${String(s).padStart(2,'0')}</div><div class="countdown-label">Sec</div></div>
        `;
    }

    function getTimeLeftStr(endTime) {
        const now = Math.floor(Date.now() / 1000);
        const diff = endTime - now;
        if (diff <= 0) return 'Ended';
        const h = Math.floor(diff / 3600);
        if (h >= 24) return Math.floor(h/24) + 'd left';
        if (h > 0) return h + 'h left';
        return Math.floor(diff/60) + 'm left';
    }

    function showToast(msg, type = '') {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = 'toast show ' + type;
        setTimeout(() => toast.className = 'toast', 3000);
    }

    function escHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // Make functions global
    window.connectWallet = connectWallet;
    window.showTab = showTab;
    window.goBack = goBack;
    window.showProposalDetail = showProposalDetail;
    window.selectOption = selectOption;
    window.submitVote = submitVote;
    window.createProposal = createProposal;
    window.addOption = addOption;

    // Start
    init();
</script>

</body>
</html>
